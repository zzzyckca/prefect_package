name: "Daily-Pipeline-Deployment"
prefect-version: 3.6.19

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      id: set-working-dir
      requires: prefect>=3.0.0
      directory: C:\prefect

deployments:
  - name: "daily-deployment"
    version: null
    tags: []
    description: null
    entrypoint: "master_pipeline.py:run_script_list"
    parameters:
      scripts_to_run:
        - 'c:\temp\temp1.py'
        - 'c:\temp\temp2.py'
        - 'c:\temp\temp3.py'
        - 'c:\temp\temp4.py'
    work_pool:
      name: "local-windows-pool"
      work_queue_name: null
      job_variables: {}
    schedules:
      - cron: "0 9 * * *"
        timezone: "America/Toronto"

  - name: "bi-weekly-monday-deployment"
    version: null
    tags: []
    description: null
    entrypoint: "master_pipeline.py:run_script_list"
    parameters:
      scripts_to_run:
        - 'c:\temp\bi_weekly_script.py'
    work_pool:
      name: "local-windows-pool"
      work_queue_name: null
      job_variables: {}
    schedules:
      - interval: 1209600.0
        anchor_date: "2026-03-09T09:00:00-04:00"
        timezone: "America/Toronto"

  - name: "custom-dates-deployment"
    version: null
    tags: []
    description: null
    entrypoint: "master_pipeline.py:run_script_list"
    parameters:
      scripts_to_run:
        - 'c:\temp\custom_date_script.py'
    work_pool:
      name: "local-windows-pool"
      work_queue_name: null
      job_variables: {}
    schedules:
      - rrule: "DTSTART:20260101T090000Z\nRRULE:FREQ=DAILY;COUNT=4\nRDATE:20260101T090000Z,20260203T090000Z,20260304T090000Z,20260321T090000Z"
        timezone: "America/Toronto"

  - name: "5th-business-day-deployment"
    version: null
    tags: []
    description: null
    entrypoint: "master_pipeline.py:run_script_list"
    parameters:
      target_business_day: 5
      scripts_to_run:
        - 'c:\temp\business_day_script.py'
    work_pool:
      name: "local-windows-pool"
      work_queue_name: null
      job_variables: {}
    schedules:
      - cron: "0 9 * * *"
        timezone: "America/Toronto"
